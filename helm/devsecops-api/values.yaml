replicaCount: 2
image:
  repository: shambhavi004/devsecops-api
  tag: "v1.0.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
env:
  DB_HOST: "postgres-service"
labels:
  app: devsecops-api
