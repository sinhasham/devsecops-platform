apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sinhasham/devsecops-platform
    targetRevision: HEAD
    path: helm/devsecops-api
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
